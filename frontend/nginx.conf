# Serves the built SPA and reverse-proxies the API (HTTP + WebSocket) to the
# backend container, so the browser only ever talks to a single origin.
server {
    listen 80;
    server_name _;

    # Large STEP uploads go through this proxy.
    client_max_body_size 512m;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: unknown paths render the app, not a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + WebSocket. `backend` is the compose service name on port 8000.
    location /api/ {
        proxy_pass http://backend:8000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # IFC generation streams progress over WebSocket for minutes; keep the
        # connection alive well past nginx's 60s defaults.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
